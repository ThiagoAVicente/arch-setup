animations {
    enabled = yes, please :)

    # Smooth bezier curves for polished feel
    bezier = smoothEaseOut, 0.16, 1, 0.3, 1
    bezier = easeOutExpo, 0.19, 1, 0.22, 1
    bezier = easeInOutQuad, 0.45, 0.05, 0.55, 0.95
    bezier = easeOutQuad, 0.25, 0.46, 0.45, 0.94
    bezier = easeInQuad, 0.55, 0.085, 0.68, 0.53
    bezier = snappy, 0.1, 0.8, 0.2, 1
    bezier = bounce, 0.34, 1.56, 0.64, 1
    bezier = elasticInOut, 0.68, -0.55, 0.265, 1.55
    bezier = linear, 0, 0, 1, 1

    # Global and basic animations
    animation = global, 1, 7, smoothEaseOut
    animation = border, 1, 3.5, snappy

    # Window animations
    animation = windows, 1, 5, easeOutExpo
    animation = windowsIn, 1, 5, easeOutExpo, popin 80%
    animation = windowsOut, 1, 2, easeOutQuad, popin 80%

    # Fade animations
    animation = fadeIn, 1, 2, easeOutQuad
    animation = fadeOut, 1, 1.5, easeOutQuad
    animation = fade, 1, 2.5, easeInOutQuad

    # Layer animations (panels, menus, popups)
    animation = layers, 1, 3.5, smoothEaseOut
    animation = layersIn, 1, 3.5, smoothEaseOut, fade
    animation = layersOut, 1, 2, easeOutQuad, fade
    animation = fadeLayersIn, 1, 2, easeOutQuad
    animation = fadeLayersOut, 1, 1.5, easeOutQuad

    # Workspace animations
    animation = workspaces, 1, 2.5, easeInOutQuad, fade
    animation = workspacesIn, 1, 2, easeOutExpo, slide
    animation = workspacesOut, 1, 2, easeOutQuad, slide
}
