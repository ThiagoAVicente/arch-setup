$font = CaskaydiaMono Nerd Font

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
}

# Clock
label {
    monitor =
    text = $TIME
    font_size = 96
    font_family = $font
    color = rgba(255, 255, 255, 0.9)

    position = 0, 160
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 20
    font_family = $font
    color = rgba(255, 255, 255, 0.5)

    position = 0, 60
    halign = center
    valign = center
}

# Logo above input
label {
    monitor =
    text = ♣
    font_size = 28
    font_family = $font
    color = rgba(255, 255, 255, 0.4)

    position = 0, -60
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(20, 20, 20, 0.7)
    font_color = rgba(255, 255, 255, 0.8)
    check_color = rgba(60, 255, 60, 0.8)
    fail_color = rgba(255, 60, 60, 0.8)

    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff66">password</span>
    fail_text = <span foreground="##ff3c3c">incorrect</span>

    rounding = 12
    font_family = $font
    font_size = 14

    position = 0, -130
    halign = center
    valign = center
}
